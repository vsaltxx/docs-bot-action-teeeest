---
name: Generate suggestion from the knowledge base of the documentation bot
description: >
  The action uses the Espressif Chatbot and its knowledge base for automatically answering Github issues.

inputs:
  in_msg:
    description: Issue message which will be handed over to the bot for evaluation.
    required: true
  title:
    description: Issue title.
    required: false
    default: ''
  bot_query_prefix:
    description: The issue message can be prefixed with this string before evaluation.
    required: false
    default: >
      The customer opened a Github issue with the following information. Please help and I'll post your answer there.
  github_comments:
    description: If set to false, the bot will not post a reply to the issue.
    default: true
    required: false
  github_token:
    description: Access token for the repository when the workflow is run. It will be used by the bot to post a reply.
    required: false
  github_repository:
    description: Repository where the workflow is run.
    required: false
  github_issue_number:
    description: Issue number in the repository from where in_msg is coming from.
    required: false
  prefix_out_msg:
    description: Post this message together with the bot's response. Can be used for warnings, disclaimers and similar.
    required: false
    default: ''
  thread_id:
    description: >
      Thread ID from a previous bot response. When provided, the bot will continue the existing conversation thread,
      giving it full context of prior exchanges. Obtain this value from the thread_id output of a previous run.
    required: false
    default: ''

outputs:
  thread_id:
    description: >
      Thread ID of the conversation started or continued by this run. Pass this value back as the thread_id input on
      subsequent runs to allow the bot to answer follow-up questions with full conversation context.
    value: ${{ steps.read-thread-id.outputs.thread_id }}

runs:
  using: composite
  steps:
    - name: Check if action is allowed to be run
      if: ${{ github.repository_owner != 'espressif' }}
      shell: bash
      run: |
        echo "Using this action from outside the organization is not supported"
        exit 1

    - name: Checkout action repository
      uses: actions/checkout@v4
      with:
        repository: espressif/docs-bot-action

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: pip

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run bot_action.py
      shell: bash
      id: bot-action
      env:
        INPUT_BOT_QUERY_PREFIX: ${{ inputs.bot_query_prefix }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_IN_MSG: ${{ inputs.in_msg }}
        INPUT_PREFIX_OUT_MSG: ${{ inputs.prefix_out_msg }}
        INPUT_THREAD_ID: ${{ inputs.thread_id }}
      run: |
        source venv/bin/activate
        printf '%s\n%s\n%s\n' "$INPUT_BOT_QUERY_PREFIX" "$INPUT_TITLE" "$INPUT_IN_MSG" > input.txt
        printf '%s\n' "$INPUT_PREFIX_OUT_MSG" > output.txt
        printf '\n---\n' >> output.txt
        if [ -n "$INPUT_THREAD_ID" ]; then
          python bot_action/bot_action.py input.txt --thread-id "$INPUT_THREAD_ID" --thread-id-output thread_id.txt >> output.txt || exit 1
        else
          python bot_action/bot_action.py input.txt --thread-id-output thread_id.txt >> output.txt || exit 1
        fi

    - name: Read thread ID and embed in comment
      id: read-thread-id
      shell: bash
      run: |
        if [ -f thread_id.txt ]; then
          THREAD_ID=$(cat thread_id.txt)
          echo "thread_id=$THREAD_ID" >> "$GITHUB_OUTPUT"
          printf '\n<!-- bot_thread_id: %s -->\n' "$THREAD_ID" >> output.txt
        fi

    - name: Archive artifacts
      uses: actions/upload-artifact@v4
      with:
        name: text-files
        retention-days: 5
        path: |
          output.txt
          input.txt

    - name: Comment
      if: ${{ inputs.github_comments == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        GH_REPO: ${{ inputs.github_repository }}
        ISSUE_NUMBER: ${{ inputs.github_issue_number }}
      run: |-
        # --edit-last will fail if there is no previous comment by the bot. See https://github.com/cli/cli/issues/10370
        gh issue comment "$ISSUE_NUMBER" --body-file output.txt --edit-last || \
        gh issue comment "$ISSUE_NUMBER" --body-file output.txt
